# kafka-backup-demos Docker Compose
# Based on: https://github.com/osodevops/kafka-backup/blob/main/docker-compose.yml
#
# Architecture:
#   - kafka-broker-1: apache/kafka (official image) - the actual Kafka broker
#   - kafka-setup/kafka-cli: bitnami/kafka - CLI tools with bash support
#   - kafka-backup: osodevops/kafka-backup - the backup tool
#
# Usage:
#   docker compose up -d                       # Start all services (default Kafka 3.7.1)
#   KAFKA_VERSION=4.0.0 docker compose up -d   # Start with specific Kafka version
#   docker compose --profile tools run --rm kafka-backup <command>
#   docker compose --profile tools run --rm kafka-cli bash -c '<kafka commands>'
#   docker compose down                        # Stop all services
#
# Supported Kafka versions: 3.7.1, 3.8.0, 3.9.0, 4.0.0, 4.1.0, 4.1.1

networks:
  kafka-net:
    driver: bridge

volumes:
  minio-data:

services:
  # Apache Kafka Broker (KRaft mode - no Zookeeper)
  kafka-broker-1:
    image: apache/kafka:${KAFKA_VERSION:-3.7.1}
    hostname: kafka-broker-1
    container_name: kafka-broker-1
    restart: always
    networks:
      - kafka-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1001
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka-broker-1:9094,EXTERNAL://kafka-broker-1:9092,CONTROLLER://kafka-broker-1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9094,EXTERNAL://kafka-broker-1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1001@kafka-broker-1:9093
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      AUTO_CREATE_TOPICS_ENABLE: 'false'
      # Allow large messages (up to 15MB) for large-messages demo
      KAFKA_MESSAGE_MAX_BYTES: 15728640
      KAFKA_REPLICA_FETCH_MAX_BYTES: 15728640

  # Topic setup helper - creates all demo topics
  # Uses bitnami/kafka for bash support (apache/kafka is a minimal JRE image without shell)
  kafka-setup:
    image: bitnami/kafka:${KAFKA_VERSION:-3.7.1}
    hostname: kafka-setup
    networks:
      - kafka-net
    depends_on:
      - kafka-broker-1
    restart: on-failure
    command: >
      bash -c 'echo "Waiting for Kafka to be ready..." &&
      sleep 10 &&
      echo "Creating demo topics..." &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic test-topic &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic orders &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic payments &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic events &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic orders_enriched &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 1 --replication-factor 1 --topic large_messages --config max.message.bytes=15728640 &&
      kafka-topics.sh --create --if-not-exists --bootstrap-server kafka-broker-1:9092 --partitions 3 --replication-factor 1 --topic benchmark-data &&
      echo "All demo topics created successfully"'

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    networks:
      - kafka-net
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # MinIO bucket setup
  minio-setup:
    image: minio/mc:latest
    networks:
      - kafka-net
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/kafka-backups --ignore-existing;
      echo 'Bucket kafka-backups created';
      "

  # Kafka CLI tools (for running kafka-console-producer, kafka-console-consumer, etc.)
  # Uses bitnami/kafka for bash support (apache/kafka is a minimal JRE image without shell)
  kafka-cli:
    image: bitnami/kafka:${KAFKA_VERSION:-3.7.1}
    hostname: kafka-cli
    networks:
      - kafka-net
    depends_on:
      - kafka-broker-1
    environment:
      KAFKA_BROKER: kafka-broker-1:9092
    volumes:
      - ./data:/data
      - ./config:/config
    profiles:
      - tools
    entrypoint: []
    command: ["bash"]

  # Kafka Backup CLI (OSS) - the backup/restore tool
  kafka-backup:
    image: osodevops/kafka-backup:latest
    networks:
      - kafka-net
    environment:
      KAFKA_BROKERS: kafka-broker-1:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      RUST_LOG: info
    depends_on:
      - kafka-broker-1
      - minio
    volumes:
      - ./config:/config
      - ./data:/data
    profiles:
      - tools

  # =============================================================================
  # Monitoring Services (use --profile monitoring to enable)
  # =============================================================================

  # Klag - Kafka Consumer Lag Exporter
  # Exposes consumer lag metrics for Prometheus
  klag:
    image: themoah/klag:latest
    hostname: klag
    container_name: klag
    networks:
      - kafka-net
    ports:
      - "8888:8888"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-broker-1:9092
      METRICS_REPORTER: prometheus
      METRICS_INTERVAL_MS: 5000
    depends_on:
      - kafka-broker-1
    profiles:
      - monitoring

  # Prometheus - Metrics collection and querying
  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    container_name: prometheus
    networks:
      - kafka-net
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - klag
    profiles:
      - monitoring

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    container_name: grafana
    networks:
      - kafka-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ═══════════════════════════════════════════════════════════
  # Enterprise Services (docker compose --profile enterprise up -d)
  # ═══════════════════════════════════════════════════════════

  # Kafka Backup Enterprise CLI
  kafka-backup-enterprise:
    image: osodevops/kafka-backup-enterprise:v0.2.1
    platform: linux/amd64
    networks:
      - kafka-net
    environment:
      KAFKA_BROKERS: kafka-broker-1:9092
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      RUST_LOG: info
    depends_on:
      - kafka-broker-1
      - minio
    volumes:
      - ./config:/config
      - ./data:/data
    profiles:
      - enterprise

  # Confluent Schema Registry (for enterprise demos)
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    networks:
      - kafka-net
    ports:
      - "8081:8081"
    depends_on:
      - kafka-broker-1
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-broker-1:9094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: http
    profiles:
      - enterprise

  # Schema Registry test data
  schema-setup:
    image: confluentinc/cp-schema-registry:7.6.0
    networks:
      - kafka-net
    depends_on:
      - schema-registry
    restart: on-failure
    profiles:
      - enterprise
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Waiting for Schema Registry...'
        until curl -sf http://schema-registry:8081/subjects > /dev/null 2>&1; do sleep 2; done
        echo 'Registering demo schemas...'

        curl -sf -X POST http://schema-registry:8081/subjects/orders-value/versions \
          -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
          -d '{"schema":"{\"type\":\"record\",\"name\":\"Order\",\"namespace\":\"com.example\",\"fields\":[{\"name\":\"order_id\",\"type\":\"string\"},{\"name\":\"customer_id\",\"type\":\"string\"},{\"name\":\"amount\",\"type\":\"double\"},{\"name\":\"created_at\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}}]}"}'

        curl -sf -X POST http://schema-registry:8081/subjects/orders-value/versions \
          -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
          -d '{"schema":"{\"type\":\"record\",\"name\":\"Order\",\"namespace\":\"com.example\",\"fields\":[{\"name\":\"order_id\",\"type\":\"string\"},{\"name\":\"customer_id\",\"type\":\"string\"},{\"name\":\"amount\",\"type\":\"double\"},{\"name\":\"created_at\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}},{\"name\":\"status\",\"type\":[\"null\",\"string\"],\"default\":null}]}"}'

        curl -sf -X POST http://schema-registry:8081/subjects/payments-value/versions \
          -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
          -d '{"schema":"{\"type\":\"record\",\"name\":\"Payment\",\"namespace\":\"com.example\",\"fields\":[{\"name\":\"payment_id\",\"type\":\"string\"},{\"name\":\"order_id\",\"type\":\"string\"},{\"name\":\"amount\",\"type\":\"double\"},{\"name\":\"currency\",\"type\":\"string\"}]}"}'

        curl -sf -X POST http://schema-registry:8081/subjects/users-value/versions \
          -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
          -d '{"schemaType":"JSON","schema":"{\"type\":\"object\",\"properties\":{\"user_id\":{\"type\":\"string\"},\"email\":{\"type\":\"string\"},\"name\":{\"type\":\"string\"}},\"required\":[\"user_id\",\"email\"]}"}'

        curl -sf -X PUT http://schema-registry:8081/config/orders-value \
          -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
          -d '{"compatibility":"FULL"}'

        echo ''
        echo 'Schemas registered:'
        curl -sf http://schema-registry:8081/subjects

  # Apicurio Registry (for enterprise demos)
  apicurio-postgres:
    image: postgres:16
    hostname: apicurio-postgres
    networks:
      - kafka-net
    environment:
      POSTGRES_DB: apicurio
      POSTGRES_USER: apicurio
      POSTGRES_PASSWORD: apicurio
    profiles:
      - enterprise

  apicurio-registry:
    image: quay.io/apicurio/apicurio-registry:latest-release
    hostname: apicurio-registry
    container_name: apicurio-registry
    networks:
      - kafka-net
    ports:
      - "8085:8080"
    depends_on:
      - apicurio-postgres
    environment:
      APICURIO_STORAGE_KIND: sql
      APICURIO_STORAGE_SQL_KIND: postgresql
      APICURIO_DATASOURCE_URL: jdbc:postgresql://apicurio-postgres:5432/apicurio
      APICURIO_DATASOURCE_USERNAME: apicurio
      APICURIO_DATASOURCE_PASSWORD: apicurio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles:
      - enterprise

  # Apicurio test data
  apicurio-setup:
    image: curlimages/curl:latest
    networks:
      - kafka-net
    depends_on:
      apicurio-registry:
        condition: service_healthy
    restart: on-failure
    profiles:
      - enterprise
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        AR=http://apicurio-registry:8080/apis/registry/v3
        echo 'Setting up Apicurio Registry test data...'

        curl -sf -X POST $$AR/groups -H 'Content-Type: application/json' \
          -d '{"groupId":"payments","description":"Payment domain schemas"}'
        curl -sf -X POST $$AR/groups -H 'Content-Type: application/json' \
          -d '{"groupId":"orders","description":"Order domain schemas"}'
        curl -sf -X POST $$AR/groups -H 'Content-Type: application/json' \
          -d '{"groupId":"common","description":"Shared types"}'

        curl -sf -X POST $$AR/groups/common/artifacts -H 'Content-Type: application/json' \
          -d '{"artifactId":"Address","artifactType":"AVRO","firstVersion":{"version":"1","content":{"content":"{\"type\":\"record\",\"name\":\"Address\",\"namespace\":\"com.example\",\"fields\":[{\"name\":\"street\",\"type\":\"string\"},{\"name\":\"city\",\"type\":\"string\"},{\"name\":\"country\",\"type\":\"string\"}]}","contentType":"application/json"}}}'

        curl -sf -X POST $$AR/groups/payments/artifacts -H 'Content-Type: application/json' \
          -d '{"artifactId":"PaymentEvent","artifactType":"AVRO","firstVersion":{"version":"1","content":{"content":"{\"type\":\"record\",\"name\":\"PaymentEvent\",\"namespace\":\"com.example\",\"fields\":[{\"name\":\"payment_id\",\"type\":\"string\"},{\"name\":\"amount\",\"type\":\"double\"},{\"name\":\"currency\",\"type\":\"string\"}]}","contentType":"application/json"}}}'

        curl -sf -X POST $$AR/groups/orders/artifacts -H 'Content-Type: application/json' \
          -d '{"artifactId":"OrderCreated","artifactType":"PROTOBUF","firstVersion":{"version":"1","content":{"content":"syntax = \"proto3\";\npackage com.example;\nmessage OrderCreated { string order_id = 1; string customer_id = 2; double amount = 3; }","contentType":"application/x-protobuf"}}}'

        curl -sf -X POST $$AR/admin/rules -H 'Content-Type: application/json' \
          -d '{"ruleType":"COMPATIBILITY","config":"BACKWARD"}'

        echo ''
        echo 'Apicurio test data registered:'
        curl -sf $$AR/groups
